# ~/.config/tmux/tmux.conf

source-file ~/.config/tmux/tmux.reset.conf

# === Look & Feel ===

# True colors support
set -g default-terminal "${TERM}"
set -sg terminal-overrides ",*:RGB"

# Set Prefix
set -g prefix ^`

# Options
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session 
set -g escape-time 0             # zero-out escape time delay
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
setw -g mode-keys vi
set -g history-limit 10000

set -g cursor-style bar
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g allow-rename on
set -sg repeat-time 0 # more responsive pane switching
set -g @fzf-url-history-limit '2000'

# yazi
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# -- Plugins Manager
set -g @plugin 'tmux-plugins/tpm'

# -- Appearance
set-option -g status-position top
set -g status-justify left

# -- Status bar
set -g status-fg '#cdd6f4'

set -g status-style bg=default,fg=black,bright

# set -g status-left-length 0
set -g status-left " "
set -g status-left '#[fg=#f9e2af] ÓĮą #S#[fg=black] | #[fg=white]#(echo "#{pane_current_path}" | '
set -g status-right "#[fg=black, bright]"

# Windows buttons
set -g @host_short "#(echo #{host} | cut -d'.' -f1)"
set -g status-right-length 150
set -g status-right '#[fg=white]#(echo "#{pane_current_path}" | awk -F/ '\''{n=NF; if (n>3) print $(n-2)"/"$(n-1)"/"$n; else print $0}'\'') |#{cpu_fg_color} Óįô #{cpu_percentage} #{ram_fg_color} ůįėö #{ram_percentage}#{?#{==:#{gpu_percentage},No GPU},, #{gpu_fg_color} ÓôĘ #{gpu_percentage}}#[default] - ÓėĶ #{host_short}'

set -g copy-mode-match-style 'fg=#1e1e2e,bg=#cdd6f4'
set -g copy-mode-current-match-style 'fg=#1e1e2e,bg=#d20f39'

set -g window-status-style 'fg=#585b70'
set -g window-status-current-style 'fg=#f9e2af'

set -g window-status-format '#{?#{==:#{window_index},1},ůįé¶ ,#{?#{==:#{window_index},2},ůįé© ,#{?#{==:#{window_index},3},ůįé¨ ,#{?#{==:#{window_index},4},ůįéģ ,#{?#{==:#{window_index},5},ůįéį ,#{?#{==:#{window_index},6},ůįéĶ ,#{?#{==:#{window_index},7},ůįéł ,#{?#{==:#{window_index},8},ůįéĽ ,#{?#{==:#{window_index},9},ůįéĺ ,ůįĹĺ }}}}}}}}}#W#{?window_zoomed_flag, ůįĀĆ , }'
set -g window-status-current-format '#{?#{==:#{window_index},1},ůįé§ ,#{?#{==:#{window_index},2},ůįéß ,#{?#{==:#{window_index},3},ůįé™ ,#{?#{==:#{window_index},4},ůįé≠ ,#{?#{==:#{window_index},5},ůįéĪ ,#{?#{==:#{window_index},6},ůįé≥ ,#{?#{==:#{window_index},7},ůįé∂ ,#{?#{==:#{window_index},8},ůįéĻ ,#{?#{==:#{window_index},9},ůįéľ ,ůįĹĹ }}}}}}}}}#W#{?window_zoomed_flag, ůįĀĆ , }'

# Panel separators
# set -g pane-border-lines simple
set -g pane-border-style 'fg=brightblack,bg=default'
set -g pane-active-border-style 'fg=#f5c2e7'

# Plugins
# set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'christoomey/vim-tmux-navigator'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'

set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'

set -g @sessionx-bind-zo-new-window 'ctrl-y'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-custom-paths '/Users/omerxx/dotfiles'
set -g @sessionx-bind 'o'
set -g @sessionx-x-path '~/dotfiles'

set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'

set -g @sessionx-filter-current 'false'
set -g @continuum-restore 'on'

# set -g @resurrect-strategy-nvim 'session'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'

run '~/.tmux/plugins/tpm/tpm'
